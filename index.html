<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes" />

    <!-- Theme & PWA -->
    <meta name="theme-color" content="#D4AF37" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0A0A0A" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vivaz" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Vivaz" />

    <!-- Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- SEO -->
    <title>Vivaz Barbearia Avenue — Agende seu Corte</title>
    <meta name="description" content="Agende seu corte na Vivaz Barbearia Avenue. Sistema completo de agendamento online com os melhores barbeiros." />
    <meta name="keywords" content="barbearia, agendamento, corte, barbeiro, Vivaz, Avenue" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="Vivaz Barbearia Avenue" />
    <meta property="og:description" content="Tradição • Estilo • Cuidado — Agende seu corte online" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Vivaz Barbearia Avenue" />
    <meta name="twitter:description" content="Agende seu corte online — Tradição, Estilo e Cuidado" />

    <!-- Splash screens iOS -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Preconnect para performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://supabase.co" />
  </head>

  <body>
    <div id="root">
      <!-- Splash screen inline para carregamento inicial -->
      <div id="splash-screen" style="
        position: fixed;
        inset: 0;
        background: #0A0A0A;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      ">
        <div style="
          width: 80px;
          height: 80px;
          border-radius: 20px;
          background: linear-gradient(135deg, #D4AF37, #B8962E);
          display: flex;
          align-items: center;
          justify-content: center;
          margin-bottom: 20px;
          box-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
        ">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 3a3 3 0 0 1 3 3c0 1.5-1 3-3 3a3 3 0 0 1-3-3 3 3 0 0 1 3-3z"/>
            <path d="M6 9v12"/>
            <path d="M18 3a3 3 0 0 1 3 3c0 1.5-1 3-3 3a3 3 0 0 1-3-3 3 3 0 0 1 3-3z"/>
            <path d="M18 9v12"/>
            <path d="M6 15h12"/>
          </svg>
        </div>
        <p style="color: #D4AF37; font-family: serif; font-size: 22px; font-weight: 700; letter-spacing: 2px; margin: 0;">VIVAZ</p>
        <p style="color: rgba(255,255,255,0.4); font-size: 11px; letter-spacing: 3px; margin-top: 4px; text-transform: uppercase;">Barbearia Avenue</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove splash screen quando o app carregar
      window.addEventListener('load', function() {
        setTimeout(function() {
          var splash = document.getElementById('splash-screen');
          if (splash) {
            splash.style.opacity = '0';
            setTimeout(function() { splash.remove(); }, 400);
          }
        }, 500);
      });
    </script>
  </body>
</html>
